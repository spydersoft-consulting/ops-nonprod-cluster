apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestore-api
  labels:
    app.kubernetes.io/controller: filestore-api
    app.kubernetes.io/instance: filestore-api
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: filestore-api
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: filestore-api-0.1.0
  namespace: platform-stage
spec:
  revisionHistoryLimit: 1
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/controller: filestore-api
      app.kubernetes.io/name: filestore-api
      app.kubernetes.io/instance: filestore-api
  template:
    metadata:
      annotations: 
        checksum/configMaps: d0a8073df2d97e273802f99db0c6916a55ee9b952cc25f120ea6c588eabcff22
      labels: 
        app.kubernetes.io/controller: filestore-api
        app.kubernetes.io/instance: filestore-api
        app.kubernetes.io/name: filestore-api
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - configMapRef:
              name: filestore-api
          - secretRef:
              name: filestore-secrets
          image: ghcr.io/spydersoft-consulting/filestore-api:0.1.0
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
