# Source: audit/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-audit-api
  labels:
    app.kubernetes.io/controller: audit-api
    app.kubernetes.io/instance: audit
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audit
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: audit-0.1.0
  namespace: platform-test
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: audit-api
      app.kubernetes.io/name: audit
      app.kubernetes.io/instance: audit
  template:
    metadata:
      annotations: 
        checksum/configMaps: c6e0a146a7552337ad5993011c7bbdd34bdbf3b00246d533c998af60a10f28e1
      labels: 
        app.kubernetes.io/controller: audit-api
        app.kubernetes.io/instance: audit
        app.kubernetes.io/name: audit
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      imagePullSecrets: 
        - name: cr-spydersoft-github
      containers: 
        - envFrom:
          - configMapRef:
              name: audit
          - secretRef:
              name: audit-secrets
          image: ghcr.io/spydersoft-consulting/audit-api:0.0.1-audit-infra.9
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
