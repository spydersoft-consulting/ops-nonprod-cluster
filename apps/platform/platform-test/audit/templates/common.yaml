---
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit
  labels:
    app.kubernetes.io/instance: audit
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: audit
    app.kubernetes.io/version: 0.1.0
    helm.sh/chart: audit-0.1.0
  namespace: platform-test
data:
  Auth__Audience: audit-api
  Auth__Authority: https://auth.mattgerega.net
  RabbitMq__Exchange: spydersoft.messaging
  RabbitMq__ExchangeType: topic
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__VirtualHost: /
  Serilog__MinimumLevel__Default: Information
  Telemetry__ActivitySourceName: Audit.Test.Activity
  Telemetry__Log__Otlp__Endpoint: http://nonproduction-grafana-alloy.grafana:4317
  Telemetry__MeterName: Audit.Test.Meter
  Telemetry__Metrics__Otlp__Endpoint: http://nonproduction-grafana-alloy.grafana:4317
  Telemetry__ServiceName: Audit.Test
  Telemetry__Trace__Otlp__Endpoint: http://nonproduction-grafana-alloy.grafana:4317
