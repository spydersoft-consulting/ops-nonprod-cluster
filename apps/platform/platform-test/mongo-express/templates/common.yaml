apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  labels:
    app.kubernetes.io/instance: mongo-express
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: mongo-express
    app.kubernetes.io/service: mongo-express
    app.kubernetes.io/version: 1.0.2
    helm.sh/chart: mongo-express-0.1.0
  namespace: platform-test
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
