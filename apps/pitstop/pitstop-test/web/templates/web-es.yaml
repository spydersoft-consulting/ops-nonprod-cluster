---
# Source: web/templates/web-es.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: web-es
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: web-secrets
    template:
      type: kubernetes.io/secret
      engineVersion: v2
      data:
        ConnectionStrings__pitstop-db: "Host=data-api-postgres;Database=pitstop;Username={{ .db_user }};Password={{ .db_password }}"
  data:
  - secretKey: db_user
    remoteRef:
      key: secrets-k8/pitstop/test/postgres
      property: user
  - secretKey: db_password
    remoteRef:
      key: secrets-k8/pitstop/test/postgres
      property: password
