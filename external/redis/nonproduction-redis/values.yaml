service:
  headless:
    ports:
      redis:
        enabled: true
        protocol: TCP
        targetPort: 6379
        port: 6379
    clusterIP: None
    controller: main
    enabled: true
    type: ClusterIP
  main:
    ports:
      redis:
        port: 6379
        protocol: TCP
        enabled: true
        targetPort: 6379
        primary: true
      metrics:
        enabled: true
        protocol: TCP
        targetPort: 9121
        port: 9121
    controller: main
    annotations:
      metrics.spydersoft.io/port: "9121"
      metrics.spydersoft.io/path: /metrics
      config.linkerd.io/opaque-ports: "6379"
      metrics.spydersoft.io/scrape: "true"
    type: ClusterIP
    primary: true
podDisruptionBudget:
  main:
    enabled: true
    maxUnavailable: 1
    controller: main
environment: nonproduction
networkPolicies:
  main:
    enabled: true
    policyTypes:
    - Ingress
    - Egress
    controller: main
    rules:
      ingress:
      - from: []
        ports:
        - protocol: TCP
          port: 6379
      - from: []
        ports:
        - protocol: TCP
          port: 4143
      egress:
      - to: []
persistence:
  data:
    type: persistentVolumeClaim
    storageClass: nfs-client
    advancedMounts:
      main:
        main:
        - readOnly: false
          path: /data
        init-permissions:
        - readOnly: false
          path: /data
    accessMode: ReadWriteOnce
    enabled: true
    retain: true
    size: 8Gi
  redis-config:
    enabled: true
    type: configMap
    advancedMounts:
      main:
        main:
        - readOnly: true
          path: /etc/redis
    identifier: redis-config
controllers:
  main:
    replicas: 1
    type: statefulset
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
    containers:
      main:
        image:
          pullPolicy: IfNotPresent
          repository: redis/redis-stack-server
          tag: 7.4.0-v8
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          exec redis-server /etc/redis/redis.conf \
            --requirepass "$REDIS_PASSWORD" \
            --masterauth "$REDIS_PASSWORD"
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
          TZ: UTC
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
        probes:
          liveness:
            enabled: true
            spec:
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 5
              successThreshold: 1
              periodSeconds: 5
              timeoutSeconds: 6
              initialDelaySeconds: 20
            custom: true
          startup:
            enabled: true
            spec:
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 1
              initialDelaySeconds: 0
            custom: true
          readiness:
            enabled: true
            spec:
              exec:
                command:
                - /bin/bash
                - -c
                - redis-cli -h localhost -p 6379 -a $REDIS_PASSWORD ping
              failureThreshold: 5
              successThreshold: 1
              periodSeconds: 5
              timeoutSeconds: 2
              initialDelaySeconds: 20
            custom: true
        resources:
          limits:
            cpu: 100m
            memory: 200Mi
          requests:
            cpu: 50m
            memory: 100Mi
      redis-exporter:
        image:
          pullPolicy: IfNotPresent
          repository: oliver006/redis_exporter
          tag: v1.62.0
        env:
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: redis-secrets
                key: redis-password
          REDIS_ADDR: redis://localhost:6379
        resources:
          limits:
            cpu: 50m
            memory: 50Mi
          requests:
            cpu: 25m
            memory: 25Mi
    enabled: true
    revisionHistoryLimit: 10
    initContainers:
      init-permissions:
        image:
          pullPolicy: IfNotPresent
          repository: busybox
          tag: 1.36
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/appendonlydir
          chown -R 1001:1001 /data
          chmod -R 755 /data
        securityContext:
          runAsGroup: 0
          runAsUser: 0
        resources:
          limits:
            cpu: 20m
            memory: 20Mi
          requests:
            cpu: 10m
            memory: 10Mi
serviceAccount:
  name: nonproduction-redis-master
  automount: false
  create: true
configMaps:
  redis-config:
    enabled: true
    data:
      redis.conf: |
        # Network
        port 6379
        bind 0.0.0.0

        # Authentication - will be overridden by environment variables
        # requirepass will be set via REDISCLI_AUTH environment variable
        # masterauth will be set via REDISCLI_AUTH environment variable

        # Persistence
        dir /data
        appendonly yes
        save ""

        # Security - disable dangerous commands
        rename-command FLUSHDB ""
        rename-command FLUSHALL ""

        # Redis Stack Modules
        loadmodule /opt/redis-stack/lib/redisearch.so MAXSEARCHRESULTS 10000 MAXAGGREGATERESULTS 10000
        loadmodule /opt/redis-stack/lib/redistimeseries.so
        loadmodule /opt/redis-stack/lib/rejson.so
        loadmodule /opt/redis-stack/lib/redisbloom.so

